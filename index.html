<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pink Search</title>

    <link rel="icon" href="./bunny.png">

    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>

    <div class="card">

        <div class="logo">
            <img src="./bunny.png" />
        </div>

        <h1>Pink Search</h1>

        <p class="subtitle">
            Pesquise qualquer coisa na internet 💖
        </p>

        <form action="https://www.google.com/search" method="GET">
            <div class="search">

                <input type="text" name="q" placeholder="O que você procura hoje? ✨" autocomplete="off" required>

                <button type="submit">
                    Pesquisar
                </button>

            </div>
        </form>

        <div class="footer">
            Feito com <span>❤</span> e muito rosa por <a href="https://github.com/ylorde" target="_blank">yLorde</a>.
        </div>

    </div>

    <div class="footer-space"></div>

</body>

</html>
